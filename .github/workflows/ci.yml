name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Build & Test ────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: api_gateway_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run migrations (test DB)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/api_gateway_test
        run: npm run db:migrate

      - name: Run tests with coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/api_gateway_test
          REDIS_URL: redis://localhost:6379
          ADMIN_API_KEY: test-admin-key-1234567890
          JWT_AUDIENCE: api-gateway
          JWT_ISSUER: https://test.example.com/
          RATE_LIMIT_ENABLED: "true"
          RATE_LIMIT_DEFAULT_RPS: "1000"
          RATE_LIMIT_DEFAULT_BURST: "2000"
          CONFIG_RELOAD_INTERVAL_MS: "60000"
          CIRCUIT_BREAKER_TIMEOUT_MS: "3000"
          CIRCUIT_BREAKER_ERROR_THRESHOLD_PERCENT: "50"
          CIRCUIT_BREAKER_RESET_TIMEOUT_MS: "10000"
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Build TypeScript
        run: npm run build

  # ─── Docker Build ─────────────────────────────────────────────
  # Validates the production image builds correctly on every push to main.
  # Actual deploy is triggered from the Railway dashboard (connected to this repo).
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: ts-api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
