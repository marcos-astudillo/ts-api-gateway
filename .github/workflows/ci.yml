name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: api_gateway_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/api_gateway_test
          REDIS_URL: redis://localhost:6379
          ADMIN_API_KEY: test-admin-key-1234567890
          JWT_AUDIENCE: api-gateway
        run: npm run test:coverage

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t ts-api-gateway:${{ github.sha }} .

      - name: Verify health endpoint starts
        run: |
          docker run -d --name gw-test \
            -e DATABASE_URL=postgresql://fake:fake@localhost/fake \
            -e REDIS_URL=redis://localhost:6379 \
            -e ADMIN_API_KEY=test-admin-key-1234567890 \
            -p 3001:3000 \
            ts-api-gateway:${{ github.sha }} || true
