[build]
  builder = "DOCKERFILE"
  dockerfilePath = "docker/Dockerfile"

[deploy]
  # Railway provides DATABASE_URL, REDIS_URL, and PORT automatically.
  # Migrations + server start are handled by the Dockerfile CMD.
  healthcheckPath = "/healthz"
  healthcheckTimeout = 100
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
