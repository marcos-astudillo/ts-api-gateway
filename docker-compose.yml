version: '3.9'

services:
  # ─── API Gateway ───────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/api_gateway
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gateway-net

  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_gateway
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gateway-net

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gateway-net

  # ─── Example: Users microservice ───────────────────────────
  users-service:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./example-services/users:/app
    command: node server.js
    environment:
      PORT: '8081'
      VERSION: 'v1'
    ports:
      - '8081:8081'
    networks:
      - gateway-net

  # ─── Example: Orders microservice (stable) ──────────────────
  orders-service:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./example-services/orders:/app
    command: node server.js
    environment:
      PORT: '8082'
      VERSION: 'v1'
    ports:
      - '8082:8082'
    networks:
      - gateway-net

  # ─── Example: Orders microservice (canary) ──────────────────
  # Set FEATURE_CANARY_RELEASES=true in gateway env to split traffic.
  orders-canary:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./example-services/orders:/app
    command: node server.js
    environment:
      PORT: '8083'
      VERSION: 'v2-canary'
      LATENCY_MS: '50'
    ports:
      - '8083:8083'
    networks:
      - gateway-net

volumes:
  postgres-data:
  redis-data:

networks:
  gateway-net:
    driver: bridge
